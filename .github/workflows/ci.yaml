name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
         fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Enviar email em caso de falha
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_ORIGIN }}
          password: ${{ secrets.SENHA_EMAIL }}
          subject: Falha no workflow do GitHub Actions
          body: O workflow falhou no passo de build.
          to: ${{ secrets.EMAIL_DESTINO }}
          from: ${{ secrets.EMAIL_ORIGIN }}

      - name: Criar nova tag caso não exista
        if: github.event_name == 'push'
        id: create_initial_tag
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -z "$(git tag)" ]; then
            git config --global user.name 'github-actions'
            git config --global user.email 'github-actions@github.com'
            git tag -a v0.0.0 -m "Initial release"
            git push origin v0.0.0
          fi

      - name: Instalar semver CLI
        if: github.event_name == 'push'
        run: npm install -g semver

      - name: Calcular nova versão
        if: github.event_name == 'push'
        id: version
        run: |
          git fetch --tags
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Versão Atual: $LAST_TAG"

          if [ "$LAST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s")
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s")
          fi

          echo "Commits desde a última tag:"
          echo "$COMMITS"

          MAJOR=0
          MINOR=0
          PATCH=0

          # Regex em variaveis: bash 5 reclama de parens quando o regex e literal dentro de [[ ]]
          re_breaking='^[a-z]+(\([^)]+\))?!:'
          re_merge='^Merge[[:space:]]'
          re_release='^chore\(release\):'
          re_feat='^feat(\([^)]+\))?:'
          re_patch='^(fix|perf|refactor|chore|docs|style|test|ci|build|revert)(\([^)]+\))?:'

          # Itera linha a linha (heredoc <<< preserva newlines; for...in com aspas iterava 1 vez so)
          while IFS= read -r COMMIT; do
            # Ignora linhas vazias, merges e commits de release gerados pelo proprio CI
            [ -z "$COMMIT" ] && continue
            [[ "$COMMIT" =~ $re_merge ]] && continue
            [[ "$COMMIT" =~ $re_release ]] && continue

            # Conventional commits: detecta tipo no INICIO do subject
            # - BREAKING CHANGE no body OU sufixo "!" (ex: feat!:, fix!:) -> MAJOR
            # - feat: ou feat(scope): -> MINOR
            # - fix|perf|refactor|chore|docs|style|test|ci|build|revert -> PATCH
            if [[ "$COMMIT" == *"BREAKING CHANGE"* ]] || [[ "$COMMIT" =~ $re_breaking ]]; then
              MAJOR=1
            elif [[ "$COMMIT" =~ $re_feat ]]; then
              [ $MAJOR -eq 0 ] && MINOR=1
            elif [[ "$COMMIT" =~ $re_patch ]]; then
              [ $MAJOR -eq 0 ] && [ $MINOR -eq 0 ] && PATCH=1
            fi
          done <<< "$COMMITS"

          CURRENT_VERSION=${LAST_TAG#v}
          NEW_VERSION=$CURRENT_VERSION
          if [[ $MAJOR -eq 1 ]]; then
            NEW_VERSION=$(semver -i major $CURRENT_VERSION)
          elif [[ $MINOR -eq 1 ]]; then
            NEW_VERSION=$(semver -i minor $CURRENT_VERSION)
          elif [[ $PATCH -eq 1 ]]; then
            NEW_VERSION=$(semver -i patch $CURRENT_VERSION)
          fi

          # Tags orfas (commits squash-merged podem deixar tag em ref que nao e ancestral
          # de origin/main; git describe ignora elas mas `git tag` sabe que existem).
          # Se a versao calculada ja existe como tag, bumpa PATCH ate achar uma livre.
          while git rev-parse "v$NEW_VERSION" >/dev/null 2>&1; do
            echo "Tag v$NEW_VERSION ja existe (orfa ou nao-ancestral); incrementando PATCH"
            NEW_VERSION=$(semver -i patch $NEW_VERSION)
          done

          echo "Nova versão: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_ENV

      - name: Atualizar versão no package.json
        if: github.event_name == 'push'
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "${{ env.new_version }}" ]; then
            npm version ${{ env.new_version }} --no-git-tag-version
          else
            echo "Versão já está ${{ env.new_version }}, pulando npm version"
          fi

      - name: Commit e push
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add package.json

          if git diff --staged --quiet; then
            echo "Nada para commitar, pulando..."
          else
            git commit -m "chore(release): version ${{ env.new_version }}"
          fi

          if ! git tag | grep -q "v${{ env.new_version }}"; then
            git tag v${{ env.new_version }}
          fi

          git push origin HEAD:${{ github.ref_name }} --tags
